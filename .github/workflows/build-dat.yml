name: Build geosite.dat

on:
  push:
    paths:
      - 'claude-ai/claude-ai.txt'
      - 'build/gen_geosite.py'
      - '.github/workflows/build-dat.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build geosite.dat
        run: python build/gen_geosite.py claude-ai/claude-ai.txt claude-ai/claude-ai.dat CLAUDE

      - name: Commit dat
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add claude-ai/claude-ai.dat
          if git diff --staged --quiet; then
            echo "Нет изменений в .dat"
          else
            git commit -m "build: пересборка claude-ai.dat"
            git push
          fi
